<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pop the 19 Balloons — Prithinga's Birthday</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap');

:root{
  --cream: #F2F1DE;
  --sky: #B7E4F9;
  --sky-deep: #7FCBEF;
  --coral: #FF7A85;
  --coral-dark: #E85A6A;
  --sun: #FFC24B;
  --mint: #7FE0C4;
  --grape: #B98AE0;
  --ink: #3A2E4A;
  --ink-soft: #6E6180;
  --olive: #A9B388;
  --olive-deep: #8A9A5B;
  --olive-pale: #E4E7CF;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  padding:0;
  min-height:100vh;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(169,179,136,0.40) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 15%, rgba(228,231,207,0.65) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 90%, rgba(138,154,91,0.28) 0%, transparent 50%),
    radial-gradient(ellipse at 15% 90%, rgba(169,179,136,0.30) 0%, transparent 50%),
    var(--cream);
  font-family:'Quicksand', sans-serif;
  color: var(--ink);
  overflow-x:hidden;
}

.float-deco{
  position:fixed;
  pointer-events:none;
  opacity:0.65;
  animation: drift 12s ease-in-out infinite;
  z-index:1;
}
.d1{ top:6%; left:6%; font-size:30px; animation-delay:0s; }
.d2{ top:75%; left:9%; font-size:24px; animation-delay:1.5s; }
.d3{ top:12%; right:8%; font-size:28px; animation-delay:3s; }
.d4{ bottom:6%; right:10%; font-size:32px; animation-delay:0.8s; }
.d5{ top:45%; left:3%; font-size:20px; animation-delay:2.4s; }
.d6{ top:35%; right:4%; font-size:22px; animation-delay:4s; }

@keyframes drift{
  0%,100%{ transform: translateY(0) rotate(-4deg); }
  50%{ transform: translateY(-16px) rotate(6deg); }
}
@media (prefers-reduced-motion: reduce){ .float-deco{ animation:none; } }

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding: 36px 20px;
  position:relative;
  z-index:2;
}

/* ---------- Intro screen ---------- */
.screen{ display:flex; flex-direction:column; align-items:center; width:100%; }
.hidden{ display:none !important; }

.intro-title{
  font-family:'Baloo 2', sans-serif;
  font-weight:800;
  font-size:clamp(28px, 6vw, 42px);
  text-align:center;
  color: var(--coral-dark);
  margin: 0 0 6px 0;
  text-shadow: 2px 2px 0 rgba(255,194,75,0.35);
}
.intro-sub{
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:clamp(18px, 3vw, 22px);
  color: var(--ink);
  margin-bottom: 22px;
  text-align:center;
}
.intro-text{
  max-width: 420px;
  text-align:center;
  font-size:15px;
  color: var(--ink-soft);
  line-height:1.7;
  margin-bottom: 10px;
}
.legend{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin: 18px 0 26px 0;
  max-width: 440px;
}
.legend span{
  background: #fff;
  border-radius: 999px;
  padding: 8px 16px;
  font-size:13px;
  font-weight:600;
  box-shadow: 0 6px 14px -8px rgba(58,46,74,0.25);
}
.intro-warn{
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:16px;
  color: var(--coral-dark);
  margin-bottom: 28px;
}

.big-btn{
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:18px;
  color: #fff;
  background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
  border:none;
  border-radius: 999px;
  padding: 16px 40px;
  cursor:pointer;
  box-shadow: 0 12px 26px -8px rgba(232,90,106,0.55);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.big-btn:hover{ transform: translateY(-2px) scale(1.02); }
.big-btn:active{ transform: translateY(0) scale(0.97); }

/* ---------- Balloon field (progress row) ---------- */
.eyebrow{
  font-family:'Baloo 2', sans-serif;
  font-size:14px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color: var(--coral-dark);
  font-weight:700;
  margin-bottom:14px;
  text-align:center;
}

.field{
  display:flex;
  gap:5px;
  margin-bottom:30px;
  flex-wrap:wrap;
  justify-content:center;
  max-width:460px;
}
.mini-balloon{
  font-size:16px;
  opacity:0.3;
  transform: scale(0.85);
  transition: all 0.35s ease;
}
.mini-balloon.done{ opacity:1; transform: scale(1); filter: grayscale(0); }
.mini-balloon.current{ opacity:1; transform: scale(1.25); animation: bob 1.4s ease-in-out infinite; }
@keyframes bob{ 0%,100%{ transform: translateY(0) scale(1.25); } 50%{ transform: translateY(-4px) scale(1.3); } }

/* ---------- Stage ---------- */
.stage{
  width: min(92vw, 480px);
  min-height: 380px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.balloon-view{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  user-select:none;
}
.balloon-emoji{
  font-size: 130px;
  line-height:1;
  filter: drop-shadow(0 14px 18px rgba(58,46,74,0.18));
  transition: transform 0.15s ease;
  animation: float-balloon 3s ease-in-out infinite;
}
@keyframes float-balloon{
  0%,100%{ transform: translateY(0) rotate(-2deg); }
  50%{ transform: translateY(-14px) rotate(2deg); }
}
.balloon-view:hover .balloon-emoji{ transform: scale(1.06); }
.balloon-view.popping .balloon-emoji{
  animation: pop-anim 0.35s ease forwards;
}
@keyframes pop-anim{
  0%{ transform: scale(1); opacity:1; }
  60%{ transform: scale(1.35); opacity:1; }
  100%{ transform: scale(0.2); opacity:0; }
}
.balloon-hint{
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:16px;
  color: var(--coral-dark);
  margin-top:18px;
  text-align:center;
}
.balloon-number{
  font-family:'Baloo 2', sans-serif;
  font-size:13px;
  color: var(--ink-soft);
  margin-bottom:6px;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

/* confetti burst */
.confetti-piece{
  position:absolute;
  width:8px; height:8px;
  top:50%; left:50%;
  border-radius:2px;
  opacity:0;
  pointer-events:none;
}
.confetti-piece.burst{
  animation: burst-out 0.7s ease-out forwards;
}
@keyframes burst-out{
  0%{ opacity:1; transform: translate(-50%,-50%) scale(1) rotate(0deg); }
  100%{ opacity:0; transform: translate(var(--tx), var(--ty)) scale(0.4) rotate(360deg); }
}

/* reveal card */
.reveal-card{
  width:100%;
  background: #fff;
  border-radius: 26px;
  padding: 38px 32px;
  text-align:center;
  box-shadow: 0 22px 50px -18px rgba(58,46,74,0.30);
  border: 2px solid rgba(232,90,106,0.14);
  animation: cardPop 0.4s cubic-bezier(.2,.8,.3,1.2);
}
@keyframes cardPop{
  from{ transform: scale(0.85); opacity:0; }
  to{ transform: scale(1); opacity:1; }
}
.tag{
  display:inline-block;
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:13px;
  padding: 6px 16px;
  border-radius: 999px;
  margin-bottom: 18px;
  letter-spacing:0.04em;
}
.tag.compliment{ background: rgba(255,194,75,0.25); color:#9A6B12; }
.tag.joke{ background: rgba(127,224,196,0.3); color:#1A7A5E; }
.tag.wish{ background: rgba(183,228,249,0.4); color:#1E6E92; }
.tag.final{ background: rgba(255,122,133,0.25); color: var(--coral-dark); }

.reveal-number{
  font-family:'Baloo 2', sans-serif;
  font-size:14px;
  color: var(--ink-soft);
  margin-bottom:10px;
  font-weight:600;
}

.reveal-text{
  font-size: clamp(17px, 3.6vw, 20px);
  line-height:1.6;
  color: var(--ink);
  font-weight:500;
  white-space: pre-line;
}

.next-btn{
  margin-top: 28px;
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:15px;
  color: #fff;
  background: linear-gradient(135deg, var(--sky-deep) 0%, #4FAFDA 100%);
  border:none;
  border-radius: 999px;
  padding: 13px 30px;
  cursor:pointer;
  box-shadow: 0 10px 22px -8px rgba(79,175,218,0.55);
  transition: transform 0.2s ease;
}
.next-btn:hover{ transform: translateY(-2px); }
.next-btn.final-btn{
  background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
  box-shadow: 0 10px 22px -8px rgba(232,90,106,0.55);
}

.restart-link{
  margin-top:18px;
  font-size:12px;
  color: var(--ink-soft);
  text-decoration:underline;
  cursor:pointer;
  background:none;
  border:none;
  font-family:'Quicksand', sans-serif;
  opacity:0.7;
}
.restart-link:hover{ opacity:1; }

.next-day-btn{
  margin-top: 22px;
  display:inline-block;
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:15px;
  color: #fff;
  background: linear-gradient(135deg, var(--grape) 0%, #7A4FB0 100%);
  border-radius: 999px;
  padding: 13px 30px;
  text-decoration:none;
  box-shadow: 0 10px 22px -8px rgba(122,79,176,0.55);
  transition: transform 0.2s ease;
}
.next-day-btn:hover{ transform: translateY(-2px); }

@media (max-width:420px){
  .balloon-emoji{ font-size:104px; }
  .reveal-card{ padding: 30px 22px; }
}
</style>
</head>
<body>

<div class="float-deco d1">🎈</div>
<div class="float-deco d2">🎉</div>
<div class="float-deco d3">✨</div>
<div class="float-deco d4">🎈</div>
<div class="float-deco d5">🎊</div>
<div class="float-deco d6">🎈</div>

<div class="wrap">

  <!-- INTRO SCREEN -->
  <div class="screen" id="introScreen">
    <div class="intro-title">🎈 POP THE 19 BALLOONS! 🎈</div>
    <div class="intro-sub">Hey, Birthday Prithinga! 💛</div>
    <div class="intro-text">There are 19 balloons waiting for you. Each one is hiding a surprise:</div>
    <div class="legend">
      <span>✨ A compliment</span>
      <span>😂 A stupid inside joke</span>
      <span>🥹 A tiny wish</span>
      <span>🎉 Something that made me smile because of you</span>
    </div>
    <div class="intro-warn">Pop them all... no cheating! 😤</div>
    <button class="big-btn" id="startBtn">Start Popping 🎈</button>
  </div>

  <!-- MAIN SCREEN -->
  <div class="screen hidden" id="mainScreen">
    <div class="eyebrow">Prithinga's Balloon Countdown</div>
    <div class="field" id="field"></div>

    <div class="stage" id="stage"></div>

    <button class="restart-link" id="restartBtn" style="display:none;">pop them all again</button>
  </div>

</div>

<script>
const data = [
  { cat:'compliment', label:'✨ Compliment', text:`You're the kind of person who makes "I'm here" actually mean something.` },
  { cat:'joke', label:'😂 Inside Joke', text:`First rule of friendship:\nDON'T STEAL MY BROTHER. HE'S MINE. 😤` },
  { cat:'wish', label:'🥹 Tiny Wish', text:`May you always have people who care for you as much as you care for them.` },
  { cat:'compliment', label:'🌸 Compliment', text:`Your kindness is so natural that I don't even think you realize how much you do for others.` },
  { cat:'joke', label:'😂 Inside Joke', text:`Who made you my personal bag carrier?\nNot me...\nBut I'm definitely not complaining (I'm grateful). 👜😂` },
  { cat:'wish', label:'💛 Tiny Wish', text:`I hope your smile never has to pretend.` },
  { cat:'compliment', label:'✨ Compliment', text:`Thank you for staying when I needed someone the most.` },
  { cat:'joke', label:'😂 Inside Joke', text:`Internship checklist:\n✅ Work\n✅ Series\n✅ Snacks\n❌ Actually leaving on time` },
  { cat:'wish', label:'🌈 Tiny Wish', text:`May your 19th year surprise you in the best possible ways.` },
  { cat:'compliment', label:'🌟 Compliment', text:`You're literally the biggest giver I know.` },
  { cat:'joke', label:'😂 Inside Joke', text:`That day in the rain...\nYou were more worried about my white dress than I was. 😂` },
  { cat:'wish', label:'🥹 Tiny Wish', text:`I hope every "one day..." turns into "today."` },
  { cat:'compliment', label:'✨ Compliment', text:`You make ordinary days feel less ordinary.` },
  { cat:'joke', label:'😂 Inside Joke', text:`You offered me your hand to cross that obstacle...\nExcuse me, who's supposed to be the gentleman here? 🤨😂` },
  { cat:'wish', label:'💙 Tiny Wish', text:`May life always be as gentle with you as you are with others.` },
  { cat:'compliment', label:'🌟 Compliment', text:`Our friendship started with a handshake...\nBest networking event (EC meet) ever. 🤝😂` },
  { cat:'joke', label:'😂 Inside Joke', text:`You don't follow me around... You just somehow appear wherever I am.\nAre you secretly using live location 24/7? 🤨📍` },
  { cat:'wish', label:'🎂 Tiny Wish', text:`I hope this year gives you more laughter, more memories, and fewer people who test your patience. 😌` },
  { cat:'final', label:'❤️ The Final Balloon', text:`Congratulations!\nYou popped all 19 balloons. 🎉\n\nOne last thing...\n\nThank you for being the person who stayed.\nThank you for making me laugh.\nThank you for carrying my bag.\nThank you for holding my hand.\nThank you for making life a little lighter.\n\nAnd once again...\nDON'T STEAL MY BROTHER.\n\nHappy 19th Birthday, Thala. ❤️🎂` }
];

let index = 0;
let popped = false;

const introScreen = document.getElementById('introScreen');
const mainScreen = document.getElementById('mainScreen');
const startBtn = document.getElementById('startBtn');
const fieldEl = document.getElementById('field');
const stageEl = document.getElementById('stage');
const restartBtn = document.getElementById('restartBtn');

const confettiColors = ['#FF7A85','#FFC24B','#7FE0C4','#B7E4F9','#B98AE0'];

function buildField(){
  fieldEl.innerHTML = '';
  for(let i=0;i<data.length;i++){
    const b = document.createElement('span');
    b.className = 'mini-balloon';
    b.id = 'mini-' + i;
    b.textContent = '🎈';
    fieldEl.appendChild(b);
  }
}

function updateField(){
  for(let i=0;i<data.length;i++){
    const b = document.getElementById('mini-'+i);
    b.classList.remove('done','current');
    if(i < index || (i === index && popped)){ b.classList.add('done'); }
    else if(i === index){ b.classList.add('current'); }
  }
}

function renderBalloonView(){
  popped = false;
  stageEl.innerHTML = `
    <div class="balloon-view" id="balloonView">
      <div class="balloon-number">Balloon ${index+1} of ${data.length}</div>
      <div class="balloon-emoji" id="balloonEmoji">🎈</div>
      <div class="balloon-hint">tap the balloon to pop it!</div>
    </div>
  `;
  document.getElementById('balloonView').addEventListener('click', popBalloon);
  updateField();
}

function spawnConfetti(container){
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random()*90;
    const tx = Math.cos(angle) * dist + 'px';
    const ty = Math.sin(angle) * dist + 'px';
    p.style.setProperty('--tx', tx);
    p.style.setProperty('--ty', ty);
    p.style.background = confettiColors[i % confettiColors.length];
    container.appendChild(p);
    requestAnimationFrame(() => p.classList.add('burst'));
    setTimeout(() => p.remove(), 750);
  }
}

function popBalloon(){
  if(popped) return;
  popped = true;
  const view = document.getElementById('balloonView');
  view.classList.add('popping');
  view.style.cursor = 'default';
  spawnConfetti(stageEl);
  updateField();
  setTimeout(renderReveal, 320);
}

function renderReveal(){
  const item = data[index];
  const isFinal = item.cat === 'final';
  stageEl.innerHTML = `
    <div class="reveal-card">
      <span class="tag ${item.cat}">${item.label}</span>
      <div class="reveal-number">Balloon ${index+1} of ${data.length}</div>
      <div class="reveal-text">${item.text}</div>
      ${isFinal ? '<a class="next-day-btn" href="time-capsule-19.html">Go to Day 3 📦</a>' : '<button class="next-btn" id="nextBtn">Next Balloon 🎈</button>'}
    </div>
  `;
  if(!isFinal){
    document.getElementById('nextBtn').addEventListener('click', () => {
      index++;
      renderBalloonView();
    });
  } else {
    restartBtn.style.display = 'inline-block';
  }
}

startBtn.addEventListener('click', () => {
  introScreen.classList.add('hidden');
  mainScreen.classList.remove('hidden');
  buildField();
  renderBalloonView();
});

restartBtn.addEventListener('click', () => {
  index = 0;
  restartBtn.style.display = 'none';
  renderBalloonView();
});
</script>

</body>
</html>
